# YOUniversity2 — production / AWS trial (single server)
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: you2-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certbot/www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: you2-api
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://youniversity:${POSTGRES_PASSWORD}@postgres:5432/youniversity2
      S3_ENDPOINT: http://minio:9000
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'bun -e "fetch(''http://127.0.0.1:3001/health/ready'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_APP_VERSION: ${VITE_APP_VERSION:-dev}
        WEB_BUILD_HEAP_MB: ${WEB_BUILD_HEAP_MB:-512}
    container_name: you2-web
    shm_size: 256mb
    environment:
      API_URL: http://api:3001
      PORT: 3000
      HOST: 0.0.0.0
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      # adapter-node default is 512 KB — SCORM zip uploads need more
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-524288000}
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: you2-postgres
    environment:
      POSTGRES_USER: youniversity
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: youniversity2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U youniversity -d youniversity2']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: you2-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: you2-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:

# Low-RAM single-server tuning (~2 GB host, ~100 concurrent learners).
# Mounted read-only; override via postgres command in docker-compose.prod.yml.

shared_buffers = 128MB
effective_cache_size = 512MB
maintenance_work_mem = 64MB
work_mem = 4MB
max_connections = 80
wal_buffers = 4MB
random_page_cost = 1.1
effective_io_concurrency = 200

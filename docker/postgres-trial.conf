# Single-server tuning for ~2 GB Lightsail (~100 concurrent learners).
# Applied via postgres -c flags in docker-compose.prod.yml.

shared_buffers = 256MB
effective_cache_size = 1024MB
maintenance_work_mem = 64MB
work_mem = 4MB
max_connections = 80
wal_buffers = 4MB
random_page_cost = 1.1
effective_io_concurrency = 200

upstream you2_api {
  server api:3001;
}

upstream you2_web {
  server web:3000;
}

# HTTP → HTTPS + Let's Encrypt challenge
server {
  listen 80;
  server_name elearning.batacon.eu elearning.batacon.sk;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name elearning.batacon.eu elearning.batacon.sk;
  client_max_body_size 520m;

  ssl_certificate /etc/letsencrypt/live/elearning.batacon.sk/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/elearning.batacon.sk/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;

  location /api/auth/oauth/ {
    proxy_pass http://you2_api;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Large uploads (SCORM/video) — bypass SvelteKit proxy body limit
  location /api/media/ {
    client_max_body_size 520m;
    proxy_pass http://you2_api;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    client_max_body_size 520m;
    proxy_pass http://you2_api;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws {
    proxy_pass http://you2_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location /health {
    proxy_pass http://you2_api;
  }

  location / {
    proxy_pass http://you2_web;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
